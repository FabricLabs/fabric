name: CI
# Gitea: pull_request uses refs/pull/<n>/head (no GitHub-style merge ref). Runner must
# advertise ubuntu-latest (see https://docs.gitea.com/usage/actions/faq).
on:
  pull_request:
    types: [opened, reopened, synchronize]
    branches:
    - '**'
  push:
    branches:
    - master
    - develop
  workflow_dispatch:
permissions:
  contents: read
env:
  # Ubuntu runners do not ship libnoise / libwally / headers required by binding.gyp.
  FABRIC_SKIP_NODE_GYP: '1'
  # GitHub Actions: opt composite actions into Node 24 before the Node 20 runner removal.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
jobs:
  test:
    # Single OS: self-hosted Gitea runners typically provide ubuntu-latest in Docker;
    # macOS-in-Docker (e.g. sickcodes/docker-osx) is brittle. GitHub.com runs macOS via
    # workflow test-macos.yaml (skipped when github.server_url is not github.com).
    name: Run tests
    runs-on: ubuntu-latest
    steps:
    - name: Checkout branch
      uses: actions/checkout@v4
      with:
        # Gitea uses refs/pull/<n>/head; GitHub uses .../merge for PRs — github.ref is correct on both.
        ref: ${{ github.ref }}
    - name: Install Node.js
      uses: actions/setup-node@v4
      with:
        node-version-file: '.nvmrc'
        cache: 'npm'
        cache-dependency-path: package-lock.json
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        # 3.12+ dropped stdlib distutils; CLN's bundled libwally (external/Makefile) still imports it.
        python-version: '3.11'
    - name: Install Ubuntu build deps and C libs
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential libsecp256k1-dev
    - name: Install dependencies
      run: npm run report:install-ci
    - name: Upload install report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: install-report-ubuntu-latest
        path: reports/install.log
        if-no-files-found: ignore
    - name: Smoke load (core modules)
      run: npm run smoke
    - name: Lint types
      run: npm run lint:types
    - name: Lint CLI harness + native accel shim
      run: npm run lint:pkg
    - name: Download and install bitcoind
      run: |
        wget https://bitcoin.org/bin/bitcoin-core-28.0/bitcoin-28.0-x86_64-linux-gnu.tar.gz
        tar -xzf bitcoin-28.0-x86_64-linux-gnu.tar.gz
        sudo mv bitcoin-28.0/bin/bitcoind bitcoin-28.0/bin/bitcoin-cli /usr/local/bin/
    - name: Run tests (with coverage for Codecov)
      run: npm run report:coverage
      timeout-minutes: 30
    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@1.79.0
    - name: Install lightningd
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          autoconf automake build-essential git libtool python3 python3-pip \
          net-tools zlib1g-dev libsqlite3-dev libgmp-dev libsodium-dev gettext

        pip3 install --upgrade pip setuptools wheel mako

        export PYTHON="$(command -v python3)"
        python3 --version

        git clone https://github.com/ElementsProject/lightning.git
        cd lightning
        git checkout v25.05
        ./configure
        make -j$(nproc)
        sudo make install

        which lightningd || echo "lightningd not found in PATH"
        ls -la /usr/local/bin/lightningd || echo "lightningd not found in /usr/local/bin"
        sudo ln -sf /usr/local/bin/lightningd /usr/bin/lightningd || true
        echo "Lightning Network installation completed"
    - name: Verify lightningd installation
      run: |
        echo "Checking lightningd installation..."
        if command -v lightningd &> /dev/null; then
          echo "✅ lightningd is available in PATH"
          lightningd --version || echo "⚠️ lightningd version check failed"
        else
          echo "❌ lightningd not found in PATH"
          echo "PATH: $PATH"
          find /usr -name lightningd 2>/dev/null || echo "No lightningd found in /usr"
          find /usr/local -name lightningd 2>/dev/null || echo "No lightningd found in /usr/local"
        fi
    - name: Send coverage report
      uses: codecov/codecov-action@v4
      with:
        directory: ./reports/
      continue-on-error: true
