name: npm test
on:
  pull_request:
    branches:
    - '**'
  push:
    branches:
    - master
jobs:
  test:
    name: Run tests
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os:
        - macos-latest
        - ubuntu-latest
    steps:
    - name: Checkout branch
      uses: actions/checkout@v3
    - name: Install Node.js on ${{ matrix.os }}
      uses: actions/setup-node@v4
      with:
        node-version-file: '.nvmrc'
        cache: 'npm'
        cache-dependency-path: package-lock.json
    - name: Set up Python
      uses: actions/setup-python@v2
      with:
        python-version: '3.8'
    - name: Install dependencies
      run: npm run report:install
    - name: Download and install bitcoind
      run: |
        if [ "${{ matrix.os }}" = "ubuntu-latest" ]; then
          wget https://bitcoin.org/bin/bitcoin-core-28.0/bitcoin-28.0-x86_64-linux-gnu.tar.gz
          tar -xzf bitcoin-28.0-x86_64-linux-gnu.tar.gz
          sudo mv bitcoin-28.0/bin/bitcoind /usr/local/bin/
        else
          brew install bitcoin
        fi
    - name: Install lightningd
      run: |
        if [ "${{ matrix.os }}" = "ubuntu-latest" ]; then
          # Install system dependencies
          sudo apt-get update
          sudo apt-get install -y \
            autoconf \
            automake \
            build-essential \
            git \
            libtool \
            python3-dev \
            python3-pip \
            libsqlite3-dev \
            libgmp-dev \
            libsodium-dev \
            gettext \
            protobuf-compiler \
            libpq-dev \
            postgresql

          # Install required Python packages
          pip3 install --user \
            mako \
            grpcio-tools \
            protobuf \
            pytest \
            pytest-timeout \
            psycopg2-binary

          # Clone and build Core Lightning
          git clone https://github.com/ElementsProject/lightning.git
          cd lightning
          git checkout v24.02.1
          ./configure
          make
          sudo make install
        elif [ "${{ matrix.os }}" = "macos-latest" ]; then
          brew install core-lightning
        fi
    - name: Generate coverage report
      run: npm run report:coverage
    - name: Send coverage report
      uses: codecov/codecov-action@v3.1.1
      with:
        directory: ./reports/
